<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Career Decision System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   Career Decision System — elegant restyle
   IBM Plex Sans · clean white cards · soft shadows
   ============================================================ */

:root {
  --bg:      #f5f6f8;
  --card:    #ffffff;
  --ink:     #1a1d23;
  --ink-2:   #374151;
  --muted:   #6b7280;
  --faint:   #9aa1ab;
  --line:    #e7e9ee;
  --line-2:  #eef0f3;

  --teal:    #1f6f63;
  --teal-d:  #185a50;

  --green:    #15803d;  --green-bg: #ecfdf3;  --green-bd: #b8e6c6;
  --amber:    #b07a10;  --amber-bg: #fff9ec;  --amber-bd: #f0dca8;
  --red:      #dc2626;  --red-bg:   #fef3f2;  --red-bd:   #f7cfcb;
  --gray:     #6b7280;  --gray-bg:  #f3f4f6;  --gray-bd:  #d1d5db;

  --radius:  18px;
  --radius-s: 12px;
  --shadow:  0 1px 2px rgba(16,24,40,.04), 0 10px 28px rgba(16,24,40,.05);
  --shadow-s: 0 1px 2px rgba(16,24,40,.05);

  --sans: "IBM Plex Sans", system-ui, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--ink);
  font-family: var(--sans); font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
button, input, textarea { font-family: var(--sans); color: inherit; }
button { cursor: pointer; }

.app { display: flex; flex-direction: column; height: 100vh; }

/* ============================================================
   App bar
   ============================================================ */
.appbar {
  display: flex; align-items: center; gap: 22px;
  padding: 14px 26px; background: var(--card);
  border-bottom: 1px solid var(--line); z-index: 30; flex: none;
}
.brand { display: flex; align-items: center; gap: 13px; flex: none; }
.brand .logo {
  width: 40px; height: 40px; border-radius: 11px; flex: none;
  background: var(--teal); color: #fff; display: grid; place-items: center;
  font-weight: 600; font-size: 18px; letter-spacing: .5px;
}
.brand h1 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: -.01em; white-space: nowrap; }
.brand .tag { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
.demo-pill {
  display: inline-flex; align-items: center; margin-left: 2px; padding: 3px 8px;
  border-radius: 999px; background: #f3f8f6; color: var(--teal);
  border: 1px solid #dbe4e1; font-size: 11px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
}

.spacer { flex: 1; }

.btn {
  background: var(--teal); color: #fff; border: 1px solid var(--teal);
  border-radius: 10px; padding: 9px 16px; font-weight: 600; font-size: 14px;
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  transition: background .15s, transform .05s, box-shadow .15s;
}
.btn:hover { background: var(--teal-d); box-shadow: 0 4px 12px rgba(31,111,99,.22); }
.btn:active { transform: translateY(1px); }
.btn.ghost { background: #fff; color: var(--ink-2); border-color: var(--line); }
.btn.ghost:hover { background: var(--bg); box-shadow: none; border-color: #d8dbe1; }
.btn.slim { padding: 7px 11px; font-size: 12.5px; border-radius: 9px; }
.btn .ic { font-size: 16px; line-height: 1; margin-top: -1px; }
.btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
.btn:disabled:hover { background: var(--teal); }
.app-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.app-actions input { display: none; }

/* ============================================================
   Full-page leaderboard (default view)
   ============================================================ */
.board { flex: 1; overflow-y: auto; padding: 34px 30px 48px; }
.board-inner { max-width: 1080px; margin: 0 auto; display: flex; flex-direction: column; gap: 26px; }

.board-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.board-head h2 { font-size: 26px; font-weight: 600; margin: 0; letter-spacing: -.02em; }
.board-head p { color: var(--muted); font-size: 14.5px; margin: 5px 0 0; }
.board-head-right { display: flex; align-items: center; gap: 18px; }
.tier-counts { display: flex; gap: 16px; }
.tier-counts .tc { font-size: 12.5px; color: var(--muted); display: inline-flex; align-items: baseline; gap: 5px; white-space: nowrap; }
.tier-counts .tc b { font-family: var(--mono); font-size: 16px; font-weight: 700; }
.tier-counts .tc.green b { color: var(--green); }
.tier-counts .tc.amber b { color: var(--amber); }
.tier-counts .tc.red b { color: var(--red); }

.tier-section { display: flex; flex-direction: column; gap: 11px; }
.tier-banner {
  display: flex; align-items: center; gap: 11px; padding: 9px 4px 9px 2px;
  border-bottom: 1.5px solid var(--line);
}
.tier-banner .tb-dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
.tier-banner.green .tb-dot { background: var(--green); }
.tier-banner.amber .tb-dot { background: var(--amber); }
.tier-banner.red   .tb-dot { background: var(--red); }
.tier-banner.gray  .tb-dot { background: var(--gray); }
.tier-banner .tb-label { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
.tier-banner.green .tb-label { color: var(--green); }
.tier-banner.amber .tb-label { color: var(--amber); }
.tier-banner.red   .tb-label { color: var(--red); }
.tier-banner.gray  .tb-label { color: var(--gray); }
.tier-banner .tb-note { font-size: 13px; color: var(--muted); }
.tier-banner .tb-count { margin-left: auto; font-family: var(--mono); font-size: 13px; color: var(--faint); }

.board-list { display: flex; flex-direction: column; gap: 9px; }

.board-cols {
  display: grid; align-items: center; gap: 16px;
  grid-template-columns: 40px minmax(170px, 1.25fr) minmax(130px, .9fr) 82px 140px minmax(150px, .85fr) 82px 98px;
  padding: 0 18px 0 22px; color: var(--faint); font-size: 11px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
}

.board-row {
  display: grid; align-items: center; gap: 16px;
  grid-template-columns: 40px minmax(170px, 1.25fr) minmax(130px, .9fr) 82px 140px minmax(150px, .85fr) 82px 98px;
  background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--line);
  border-radius: var(--radius-s); padding: 14px 18px; cursor: pointer;
  box-shadow: var(--shadow-s); transition: box-shadow .15s, transform .05s, border-color .15s;
}
.board-row:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.board-row.green { border-left-color: var(--green); }
.board-row.amber { border-left-color: var(--amber); }
.board-row.red   { border-left-color: var(--red); }
.board-row.archived {
  border-left-color: var(--gray); background: var(--gray-bg); color: var(--gray);
}
.board-row.archived:hover { box-shadow: var(--shadow-s); }

.br-rank { display: grid; place-items: center; }
.br-rank span {
  font-family: var(--mono); font-size: 17px; font-weight: 700; color: var(--faint);
  width: 32px; height: 32px; display: grid; place-items: center;
  background: var(--bg); border: 1px solid var(--line); border-radius: 9px;
}
.board-row.green .br-rank span { color: var(--green); }
.board-row.amber .br-rank span { color: var(--amber); }
.board-row.red   .br-rank span { color: var(--red); }
.board-row.archived .br-rank span { color: var(--gray); background: #fff; }

.br-main { min-width: 0; }
.br-co { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.br-ti { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

.br-stage { display: flex; align-items: center; gap: 9px; min-width: 0; }
.br-stage .stage-n {
  width: 24px; height: 24px; flex: none; border-radius: 7px; background: #eef2f1; color: var(--teal);
  border: 1px solid #dbe4e1; display: grid; place-items: center; font-size: 12px; font-weight: 700; font-family: var(--mono);
}
.br-stage .stage-name { font-size: 13px; color: var(--ink-2); line-height: 1.25; }

.br-score { display: flex; justify-content: flex-start; }
.metric {
  font-family: var(--mono); font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--line); white-space: nowrap;
}
.metric.green { background: var(--green-bg); color: var(--green); border-color: var(--green-bd); }
.metric.amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-bd); }
.metric.red   { background: var(--red-bg);   color: var(--red);   border-color: var(--red-bd); }
.metric.gray  { background: #fff; color: var(--gray); border-color: var(--gray-bd); }
.metric.ghosted { color: var(--faint); background: var(--bg); font-family: var(--sans); font-weight: 500; font-size: 12px; letter-spacing: .04em; }

.br-verdict { min-width: 0; }
.vpill {
  display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600;
  padding: 5px 12px; border-radius: 20px; border: 1px solid; max-width: 100%;
}
.vpill .vd { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.vpill.green { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); } .vpill.green .vd { background: var(--green); }
.vpill.amber { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bd); } .vpill.amber .vd { background: var(--amber); }
.vpill.red   { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd); }   .vpill.red .vd   { background: var(--red); }
.vpill.gray  { color: var(--gray);  background: #fff; border-color: var(--gray-bd); } .vpill.gray .vd { background: var(--gray); }

.br-note { min-width: 0; position: relative; }
.note-btn {
  display: inline-flex; align-items: center; gap: 7px; max-width: 100%; border: 1px solid transparent;
  background: transparent; color: var(--muted); border-radius: 9px; padding: 5px 8px;
  font-size: 13px; font-weight: 600; text-align: left; transition: all .12s;
}
.note-btn:hover { background: var(--bg); border-color: var(--line); color: var(--ink-2); }
.note-btn .plus { font-size: 19px; line-height: 1; margin-top: -1px; }
.note-btn.has-note { color: var(--teal); background: #f3f8f6; border-color: #dbe4e1; }
.note-preview { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-tooltip {
  position: absolute; z-index: 80; left: 8px; top: calc(100% + 8px); width: min(300px, 70vw);
  background: #1f2329; color: #f7f8fa; border: 1px solid #3c424b; border-radius: 10px;
  padding: 10px 12px; box-shadow: 0 14px 38px rgba(16,24,40,.25);
  font-size: 13px; line-height: 1.45; white-space: normal; opacity: 0; pointer-events: none;
  transform: translateY(-3px); transition: opacity .12s, transform .12s;
}
.br-note:hover .note-tooltip, .br-note:focus-within .note-tooltip { opacity: 1; transform: none; }

.br-time { display: flex; flex-direction: column; line-height: 1.3; text-align: right; }
.br-time .t-date { font-size: 12.5px; color: var(--ink-2); font-weight: 500; }
.br-time .t-time { font-size: 11.5px; color: var(--faint); font-family: var(--mono); }

.br-actions { display: flex; gap: 4px; justify-content: flex-end; }
.row-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid transparent; background: transparent;
  color: var(--faint); display: grid; place-items: center; transition: all .12s;
}
.row-btn svg { width: 15px; height: 15px; }
.row-btn:hover { background: var(--bg); border-color: var(--line); color: var(--ink-2); }
.row-btn.archive:hover { background: var(--gray-bg); border-color: var(--gray-bd); color: var(--gray); }
.row-btn.danger:hover { background: var(--red-bg); border-color: var(--red-bd); color: var(--red); }

.board-empty {
  text-align: center; padding: 60px 20px; background: #fff; border: 1px solid var(--line);
  border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.board-empty .be-mark {
  width: 52px; height: 52px; border-radius: 14px; background: var(--teal); color: #fff;
  display: grid; place-items: center; font-size: 26px; margin-bottom: 6px;
}
.board-empty h3 { margin: 0; font-size: 19px; font-weight: 600; }
.board-empty p { margin: 0 0 12px; color: var(--muted); font-size: 14px; max-width: 380px; }

/* ============================================================
   North-star footer
   ============================================================ */
.northstar {
  flex: none; display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 13px 20px; background: var(--teal); color: #fff;
  font-size: 15px; font-weight: 500; letter-spacing: .04em;
}
.northstar svg { width: 15px; height: 15px; opacity: .85; }

/* ============================================================
   Scrim + modal base
   ============================================================ */
.scrim {
  position: fixed; inset: 0; z-index: 100; background: rgba(20,24,30,.42);
  display: flex; align-items: center; justify-content: center; padding: 32px 20px;
  animation: fade .14s ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal {
  width: min(440px, 100%); background: #fff; border-radius: 18px;
  box-shadow: 0 24px 64px rgba(16,24,40,.28); overflow: hidden;
  animation: pop .16s cubic-bezier(.2,.8,.3,1);
}
@keyframes pop { from { transform: translateY(8px) scale(.98); opacity: 0; } to { transform: none; opacity: 1; } }

/* ============================================================
   Large evaluation modal
   ============================================================ */
.modal.modal-lg {
  width: min(880px, 100%); max-height: calc(100vh - 80px);
  display: flex; flex-direction: column;
}
.modal .modal-h {
  padding: 22px 26px 18px; display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; border-bottom: 1px solid var(--line); flex: none;
}
.modal-h h2 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: -.01em; }
.modal-h p { color: var(--muted); font-size: 13.5px; margin: 4px 0 0; }
.modal-x {
  border: 1px solid var(--line); background: #fff; color: var(--muted); border-radius: 9px;
  width: 32px; height: 32px; font-size: 14px; line-height: 1; flex: none; transition: all .12s;
}
.modal-x:hover { background: var(--bg); color: var(--ink); }

.modal-scroll { overflow-y: auto; padding: 22px 26px 8px; display: flex; flex-direction: column; gap: 20px; }

.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.mfield { display: flex; flex-direction: column; gap: 5px; }
.mfield label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--faint); }
.mfield input {
  border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 14.5px; background: #fff;
  transition: border-color .15s, box-shadow .15s;
}
.mfield textarea {
  min-height: 112px; resize: vertical; border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 12px; font-size: 14.5px; line-height: 1.45; background: #fff;
  transition: border-color .15s, box-shadow .15s;
}
.mfield input:focus, .mfield textarea:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(31,111,99,.12); }
.mfield input::placeholder, .mfield textarea::placeholder { color: var(--faint); }

/* stage selector tabs */
.stage-tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.stage-tab {
  display: flex; flex-direction: column; align-items: flex-start; gap: 7px; text-align: left;
  padding: 11px 12px; border-radius: 11px; border: 1.5px solid var(--line); background: #fff;
  transition: all .14s;
}
.stage-tab:hover { border-color: #cdd2da; background: var(--bg); }
.stage-tab .st-n {
  width: 24px; height: 24px; flex: none; border-radius: 7px; background: var(--bg); color: var(--muted);
  border: 1px solid var(--line); display: grid; place-items: center; font-size: 12.5px; font-weight: 700; font-family: var(--mono);
  transition: all .14s;
}
.stage-tab .st-name { font-size: 12.5px; font-weight: 600; color: var(--ink-2); line-height: 1.25; }
.stage-tab.active { border-color: var(--teal); background: #f3f8f6; box-shadow: 0 0 0 3px rgba(31,111,99,.10); }
.stage-tab.active .st-n { background: var(--teal); color: #fff; border-color: var(--teal); }
.stage-tab.active .st-name { color: var(--teal-d); }

/* modal footer */
.modal-f { display: flex; gap: 10px; justify-content: flex-end; padding: 15px 24px; border-top: 1px solid var(--line); background: var(--bg); }
.modal-lg .modal-f { justify-content: space-between; align-items: center; flex: none; }
.live-verdict { display: flex; align-items: center; gap: 9px; font-size: 13px; min-width: 0; }
.live-verdict .lv-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--faint); }
.live-verdict .lv-val { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
.live-verdict .lv-val .vd { width: 9px; height: 9px; border-radius: 50%; }
.live-verdict.green .lv-val { color: var(--green); } .live-verdict.green .lv-val .vd { background: var(--green); }
.live-verdict.amber .lv-val { color: var(--amber); } .live-verdict.amber .lv-val .vd { background: var(--amber); }
.live-verdict.red   .lv-val { color: var(--red); }   .live-verdict.red .lv-val .vd   { background: var(--red); }
.live-verdict .lv-tier { color: var(--muted); font-weight: 500; }
.modal-f-actions { display: flex; gap: 10px; }
.archive-preview {
  border: 1px solid var(--gray-bd); background: var(--gray-bg); border-radius: var(--radius-s);
  padding: 12px 14px; margin: 18px 24px 0; color: var(--gray);
}
.archive-preview b { display: block; color: var(--ink-2); font-size: 14px; margin-bottom: 2px; }
.archive-preview span { font-size: 13px; }
.modal.note-modal {
  width: min(720px, calc(100% - 28px)); background: #1b2026; color: #f5f7fb;
  border: 2px solid #91c4ff; box-shadow: 0 24px 70px rgba(0,0,0,.38);
}
.note-modal .modal-h { border-bottom-color: #343a43; }
.note-modal .modal-h h2 { font-size: 26px; color: #fff; }
.note-modal .modal-h p { color: #c7ccd4; }
.note-modal .modal-x { border-color: transparent; background: transparent; color: #d7dbe1; font-size: 24px; }
.note-modal .modal-x:hover { background: #262c34; color: #fff; }
.note-job {
  display: flex; gap: 15px; align-items: center; padding: 22px 28px 4px;
}
.note-job-logo {
  width: 58px; height: 58px; border-radius: 8px; background: var(--teal); color: #fff;
  display: grid; place-items: center; font-weight: 700; letter-spacing: .04em; flex: none;
}
.note-job-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.25; }
.note-job-sub { color: #c7ccd4; font-size: 14px; margin-top: 3px; }
.note-modal .modal-scroll { padding: 18px 28px 8px; }
.note-modal .note-copy { font-size: 17px; margin: 0 0 14px; color: #f5f7fb; }
.note-modal textarea {
  min-height: 150px; background: #1b2026; color: #fff; border: 2px solid #d6dbe2;
  border-radius: 7px; font-size: 16px;
}
.note-modal textarea:focus { border-color: #75b9ff; box-shadow: 0 0 0 3px rgba(117,185,255,.18); }
.note-modal .modal-f { background: #1b2026; border-top: none; padding: 18px 28px 26px; }
.note-modal .btn { background: #75b9ff; border-color: #75b9ff; color: #05111d; border-radius: 24px; font-size: 16px; padding: 10px 24px; }
.note-modal .btn:hover { background: #9bcbff; box-shadow: none; }
.note-modal .btn.ghost { background: transparent; border-color: transparent; color: #d7dbe1; }
.note-modal .btn.ghost:hover { background: #262c34; color: #fff; }

/* ============================================================
   Stage card (scorecard inside modal)
   ============================================================ */
.score-area .stage-card {
  width: 100%; border: 1px solid var(--line); box-shadow: none; border-radius: var(--radius-s);
  padding: 22px 22px 20px; background: #fcfdfd;
}

.stage-card {
  width: 700px; flex: none; background: var(--card);
  border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 26px 30px 24px;
  display: flex; flex-direction: column; gap: 20px;
}

.sc-head { display: flex; align-items: flex-start; gap: 15px; }
.sc-badge {
  width: 46px; height: 46px; border-radius: 50%; flex: none;
  background: var(--teal); color: #fff; display: grid; place-items: center;
  font-weight: 600; font-size: 19px;
}
.sc-badge.soft { background: #eef2f1; color: var(--teal); border: 1px solid #dbe4e1; }
.sc-htext h3 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -.01em; }
.sc-htext .sub { color: var(--muted); font-size: 14px; margin-top: 2px; }

.input-chip {
  display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
  font-size: 11.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); background: var(--bg); border: 1px solid var(--line);
  padding: 6px 11px; border-radius: 8px; white-space: nowrap;
}
.input-chip svg { width: 14px; height: 14px; }

.sc-body { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 30px; }
.col-label {
  font-size: 12px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
  color: var(--ink-2); margin-bottom: 16px;
}

/* criterion + slider */
.crit { margin-bottom: 17px; }
.crit:last-child { margin-bottom: 0; }
.crit-top { display: flex; align-items: baseline; gap: 9px; margin-bottom: 9px; }
.crit-name { font-weight: 600; font-size: 15px; }
.crit-q { color: var(--muted); font-size: 13.5px; font-weight: 400; }
.crit-q::before { content: "— "; }
.crit-val { margin-left: auto; font-weight: 700; font-size: 15px; font-family: var(--mono); }
.crit-val.lo { color: var(--red); } .crit-val.mid { color: var(--amber); } .crit-val.hi { color: var(--green); }

input[type=range].slider {
  -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
  border-radius: 6px; background: var(--line); outline: none; cursor: pointer;
}
input[type=range].slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 17px; height: 17px; border-radius: 50%;
  background: #fff; border: 2.5px solid var(--teal); box-shadow: 0 1px 3px rgba(16,24,40,.2);
}
input[type=range].slider::-moz-range-thumb {
  width: 17px; height: 17px; border-radius: 50%; background: #fff;
  border: 2.5px solid var(--teal); box-shadow: 0 1px 3px rgba(16,24,40,.2);
}

/* decision gate */
.gate { display: flex; flex-direction: column; gap: 13px; }
.gate-item { display: flex; align-items: center; gap: 13px; padding: 4px; border-radius: 10px; transition: background .15s; }
.gate-item.active { background: var(--bg); }
.gate-dia {
  width: 44px; height: 44px; flex: none; transform: rotate(45deg);
  border-radius: 11px; border: 1.5px solid; display: grid; place-items: center;
}
.gate-dia .d { width: 11px; height: 11px; border-radius: 50%; transform: rotate(-45deg); }
.gate-dia.green { background: var(--green-bg); border-color: var(--green-bd); } .gate-dia.green .d { background: var(--green); }
.gate-dia.amber { background: var(--amber-bg); border-color: var(--amber-bd); } .gate-dia.amber .d { background: var(--amber); }
.gate-dia.red   { background: var(--red-bg);   border-color: var(--red-bd); }   .gate-dia.red .d   { background: var(--red); }
.gate-item.active .gate-dia { box-shadow: 0 0 0 4px rgba(0,0,0,.04); }
.gate-text b { font-size: 14.5px; font-weight: 600; display: block; }
.gate-text.green b { color: var(--green); } .gate-text.amber b { color: var(--amber); } .gate-text.red b { color: var(--red); }
.gate-text span { font-size: 13px; color: var(--muted); }

/* reject box */
.tint-box { border-radius: var(--radius-s); padding: 15px 17px; border: 1px solid; }
.tint-box.red  { background: var(--red-bg);  border-color: var(--red-bd); }
.tint-box.amber{ background: var(--amber-bg);border-color: var(--amber-bd); }
.tint-box .tb-head {
  display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14.5px; margin-bottom: 11px;
}
.tint-box.red .tb-head { color: var(--red); }
.tint-box.amber .tb-head { color: var(--amber); }
.tb-head svg { width: 17px; height: 17px; }

.check { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 14px; cursor: pointer; color: var(--ink-2); }
.check input { position: absolute; opacity: 0; width: 0; height: 0; }
.check .box {
  width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid #cdd2da; background: #fff;
  flex: none; display: grid; place-items: center; transition: all .12s;
}
.check input:checked + .box { background: var(--red); border-color: var(--red); }
.check .box svg { width: 12px; height: 12px; color: #fff; opacity: 0; }
.check input:checked + .box svg { opacity: 1; }
.check.crossed input:checked ~ .lab { color: var(--red); text-decoration: line-through; text-decoration-color: rgba(220,38,38,.5); }

/* your decision box */
.decision {
  border: 1px solid var(--line); border-radius: var(--radius-s); padding: 15px 17px;
  background: #fff;
}
.decision.green { border-color: var(--green-bd); background: var(--green-bg); }
.decision.amber { border-color: var(--amber-bd); background: var(--amber-bg); }
.decision.red   { border-color: var(--red-bd);   background: var(--red-bg); }
.decision .dl { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.decision .dv { font-weight: 700; font-size: 22px; margin-top: 3px; letter-spacing: -.01em; }
.decision.green .dv { color: var(--green); } .decision.amber .dv { color: var(--amber); } .decision.red .dv { color: var(--red); }
.decision .ds { font-size: 13px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }

/* questions / checkpoint */
.qlist { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 11px; }
.qlist li { display: flex; gap: 11px; font-size: 15px; align-items: flex-start; }
.qlist li .qb {
  width: 22px; height: 22px; border-radius: 7px; flex: none; background: var(--bg);
  border: 1px solid var(--line); color: var(--teal); font-size: 12px; font-weight: 600;
  display: grid; place-items: center; font-family: var(--mono); margin-top: 1px;
}
.checkpoint {
  border-radius: var(--radius-s); border: 1px solid var(--line); background: var(--bg);
  padding: 16px 18px;
}
.checkpoint .cl { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.checkpoint .cl svg { width: 14px; height: 14px; color: var(--teal); }
.checkpoint .cq { font-size: 17px; font-weight: 500; line-height: 1.35; color: var(--ink); }

.wait-rule { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line-2); }
.wait-rule:last-child { border-bottom: none; }
.wait-rule .badge {
  font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--teal);
  background: #eef2f1; border: 1px solid #dbe4e1; border-radius: 20px; padding: 3px 11px; flex: none;
}
.wait-rule .wt { font-size: 15px; }

/* total footer */
.sc-total {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--line); padding-top: 17px; margin-top: 2px;
}
.sc-total .tl { font-weight: 600; font-size: 15px; }
.sc-total .tn { font-family: var(--mono); font-weight: 700; font-size: 27px; letter-spacing: -.02em; }
.sc-total .tn .den { color: var(--faint); font-size: 16px; font-weight: 500; }
.sc-total .tn.lo { color: var(--red); } .sc-total .tn.mid { color: var(--amber); } .sc-total .tn.hi { color: var(--green); }

/* trigger chips */
.trigger-chip {
  font-size: 12px; font-family: var(--mono); color: var(--amber);
  background: #fff; border: 1px solid var(--amber-bd); border-radius: 20px; padding: 2px 9px;
}

/* interactive decision picker */
.decide-opts { display: flex; flex-direction: column; gap: 9px; }
.decide-opt {
  display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: var(--radius-s);
  border: 1.5px solid var(--line); background: #fff; text-align: left; transition: all .14s;
}
.decide-opt:hover { border-color: #cdd2da; }
.decide-dia { width: 30px; height: 30px; flex: none; transform: rotate(45deg); border-radius: 8px; border: 1.5px solid; display: grid; place-items: center; }
.decide-dia .d { width: 9px; height: 9px; border-radius: 50%; transform: rotate(-45deg); }
.decide-dia.green { background: var(--green-bg); border-color: var(--green-bd); } .decide-dia.green .d { background: var(--green); }
.decide-dia.amber { background: var(--amber-bg); border-color: var(--amber-bd); } .decide-dia.amber .d { background: var(--amber); }
.decide-dia.red   { background: var(--red-bg);   border-color: var(--red-bd); }   .decide-dia.red .d   { background: var(--red); }
.decide-lab { font-size: 14.5px; font-weight: 600; color: var(--ink-2); flex: 1; }
.decide-tick { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--line); display: grid; place-items: center; flex: none; color: transparent; }
.decide-tick svg { width: 11px; height: 11px; }
.decide-opt.sel.green { border-color: var(--green-bd); background: var(--green-bg); }
.decide-opt.sel.amber { border-color: var(--amber-bd); background: var(--amber-bg); }
.decide-opt.sel.red   { border-color: var(--red-bd);   background: var(--red-bg); }
.decide-opt.sel.green .decide-tick { background: var(--green); border-color: var(--green); color: #fff; }
.decide-opt.sel.amber .decide-tick { background: var(--amber); border-color: var(--amber); color: #fff; }
.decide-opt.sel.red   .decide-tick { background: var(--red);   border-color: var(--red);   color: #fff; }
.decide-opt.sel .decide-lab { color: var(--ink); }

/* scrollbars */
::-webkit-scrollbar { height: 12px; width: 11px; }
::-webkit-scrollbar-thumb { background: #d4d8df; border-radius: 10px; border: 3px solid var(--bg); }

@media (max-width: 720px) {
  .appbar { align-items: flex-start; flex-direction: column; }
  .app-actions { width: 100%; justify-content: flex-start; }
  .board-cols { display: none; }
  .board-row { grid-template-columns: 34px 1fr auto; grid-auto-rows: auto; gap: 8px 12px; }
  .br-stage, .br-score, .br-verdict, .br-note { grid-column: 2 / -1; }
  .br-time { grid-column: 2; text-align: left; flex-direction: row; gap: 8px; align-items: baseline; }
  .br-actions { grid-column: 3; grid-row: 1; }
  .stage-tabs { grid-template-columns: repeat(2, 1fr); }
  .meta-grid { grid-template-columns: 1fr; }
}
</style>

<!-- data.jsx -->
<script type="text/babel">
const STAGES = [
  {
    id: "discovery", n: 1,
    name: "Job Discovery / JD Review",
    sub: "Score the role. Trust the data.",
    input: "Job description",
    scoreLabel: "Role Scoring (0–2 each)",
    range: [0, 2],
    criteria: [
      { name: "Builder Energy", q: "Do I get to create?" },
      { name: "Expansion",      q: "Will I grow?" },
      { name: "Momentum",       q: "Is the org moving?" },
      { name: "Resonance",      q: "Does this feel right?" },
      { name: "Meaning",        q: "Does the mission matter?" },
      { name: "Sustainability", q: "Can I sustain this?" },
      { name: "Career Signal",  q: "Does this signal well?" },
    ],
    gate: {
      max: 14,
      rules: [
        { color: "green", cond: "8+",  title: "Tier A", sub: "Prioritize — full energy" },
        { color: "amber", cond: "6–7", title: "Tier B", sub: "Strategic — proceed carefully" },
        { color: "red",   cond: "≤5",  title: "Reject", sub: "Don't force what doesn't fit" },
      ],
    },
    autoReject: ["Severe shrinking feeling", "Obviously wrong level", "Unsustainable culture", "Pure coordination PM"],
  },
  {
    id: "recruiter", n: 2,
    name: "Recruiter / Intro Call",
    sub: "Reality-check your assumptions.",
    questions: ["Ownership?", "Role scope?", "Team structure?", "Why hiring?"],
    scoreLabel: "Post-call scoring (1–5 each)",
    range: [1, 5],
    criteria: [
      { name: "Expansion",      q: "Room to grow?" },
      { name: "Aliveness",      q: "Does it energize me?" },
      { name: "Resonance",      q: "Does it feel right?" },
      { name: "Momentum",       q: "Is it moving?" },
      { name: "Sustainability", q: "Can I hold the pace?" },
    ],
    gate: {
      kind: "avg", max: 5,
      rules: [
        { color: "green", cond: "≥3.5",    title: "Continue",         sub: "Momentum is real" },
        { color: "amber", cond: "2.5–3.4", title: "Gather more data", sub: "Get one more signal" },
        { color: "red",   cond: "<2.5",    title: "Stop",             sub: "Trust the read" },
      ],
    },
    emotional: {
      rule: "No quitting within 24h of an inadequacy trigger.",
      triggers: ["Comparison", "Technical fear", "Tough interview", "Rejection"],
    },
  },
  {
    id: "hm", n: 3,
    name: "Hiring Manager / Team",
    sub: "Read the environment.",
    questions: [
      "What are the biggest unresolved problems?",
      "What shipped recently?",
      "What decisions do PMs own here?",
      "What kind of PM thrives here?",
    ],
    checkpoint: "Would future me regret NOT exploring this?",
    reflective: true,
    decisions: {
      prompt: "Would future me regret NOT exploring this?",
      options: [
        { color: "green", label: "Yes — worth exploring" },
        { color: "amber", label: "Unsure — sit with it" },
        { color: "red",   label: "No — let it go" },
      ],
    },
  },
  {
    id: "emotion", n: 4,
    name: "Emotional Regulation",
    sub: "Separate signal from emotion.",
    waitRules: [
      { badge: "48h", text: "Excitement spike — wait before deciding." },
      { badge: "48h", text: "Fear spike — wait before deciding." },
    ],
    checkpoint: "Is this signal, or is this emotion?",
    reflective: true,
    decisions: {
      prompt: "Is this signal, or is this emotion?",
      options: [
        { color: "green", label: "Signal — trust it" },
        { color: "amber", label: "Mixed — wait 48h" },
        { color: "red",   label: "Emotion — don't act" },
      ],
    },
  },
  {
    id: "offer", n: 5,
    name: "Offer Stage",
    sub: "The whole-self check.",
    scoreLabel: "Rate the offer (1–5 each)",
    range: [1, 5],
    criteria: [
      { name: "Expansion",      q: "Will I stretch?" },
      { name: "Aliveness",      q: "Will I feel alive?" },
      { name: "Resonance",      q: "Does it fit me?" },
      { name: "Momentum",       q: "Is it accelerating?" },
      { name: "Meaning",        q: "Does it matter?" },
      { name: "Sustainability", q: "Is it sustainable?" },
      { name: "Self-respect",   q: "Can I be proud?" },
    ],
    gate: {
      max: 35,
      rules: [
        { color: "green", cond: "≥28",   title: "Strong Yes", sub: "Say yes, fully" },
        { color: "amber", cond: "23–27", title: "Negotiate",  sub: "Worth shaping" },
        { color: "red",   cond: "<23",   title: "No",         sub: "Walk with respect" },
      ],
    },
  },
];

const SCORABLE = STAGES.filter((s) => s.criteria);

function jdTier(total) {
  if (total >= 8) return { key: "A", color: "green", label: "Tier A — Prioritize" };
  if (total >= 6) return { key: "B", color: "amber", label: "Tier B — Strategic" };
  return { key: "R", color: "red", label: "Reject" };
}
function recruiterVerdict(avg) {
  if (avg >= 3.5) return { color: "green", label: "Continue" };
  if (avg >= 2.5) return { color: "amber", label: "Gather more data" };
  return { color: "red", label: "Stop" };
}
function offerVerdict(sum) {
  if (sum >= 28) return { color: "green", label: "Strong Yes" };
  if (sum >= 23) return { color: "amber", label: "Negotiate" };
  return { color: "red", label: "No" };
}

function computeStage(stage, scoreMap) {
  const vals = stage.criteria.map((c) => (scoreMap && scoreMap[c.name] != null ? scoreMap[c.name] : stage.range[0]));
  const sum = vals.reduce((a, b) => a + b, 0);
  if (stage.id === "recruiter") {
    const avg = vals.length ? sum / vals.length : 0;
    return { sum, avg, metricText: avg.toFixed(1) + " avg", verdict: recruiterVerdict(avg) };
  }
  if (stage.id === "offer") {
    return { sum, metricText: sum + "/" + stage.gate.max, verdict: offerVerdict(sum) };
  }
  return { sum, metricText: sum + "/" + stage.gate.max, verdict: jdTier(sum) };
}

function evalVerdict(stage, values) {
  if (stage.criteria) {
    const c = computeStage(stage, values);
    const norm = stage.id === "recruiter" ? c.avg / 5 : c.sum / stage.gate.max;
    return { color: c.verdict.color, label: c.verdict.label, metricText: c.metricText, norm };
  }
  const opts = stage.decisions.options;
  const opt = opts.find((o) => o.color === (values && values.choice)) || opts[1];
  const norm = opt.color === "green" ? 0.9 : opt.color === "amber" ? 0.5 : 0.1;
  return { color: opt.color, label: opt.label, metricText: opt.label, norm };
}

const TIERS = {
  green: { key: "A", order: 0, label: "Tier A — Prioritize" },
  amber: { key: "B", order: 1, label: "Tier B — Strategic" },
  red:   { key: "R", order: 2, label: "Rejected" },
};
function tierFromColor(color) { return TIERS[color] || TIERS.red; }

function nowStamp() { return new Date().toISOString(); }
function formatStamp(iso) {
  const d = new Date(iso);
  const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  const time = d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  return { date, time };
}

const STORE_KEY = "cds_evaluations_v4";
function loadEvals() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch (e) { return []; }
}
function saveEvals(list) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(list)); } catch (e) {}
}
function demoSeed() {
  const mk = (company, title, stageId, raw, iso) => {
    const stage = STAGES.find((s) => s.id === stageId);
    const v = evalVerdict(stage, raw);
    return { id: "seed-" + company.replace(/\s+/g, "-").toLowerCase(),
      company, title, stageId, stageName: stage.name, raw,
      note: "Fictional demo data for portfolio viewing.",
      ts: iso, color: v.color, label: v.label, metricText: v.metricText, norm: v.norm };
  };
  return [
    mk("Northstar Demo Co.", "Principal PM, AI Products", "offer",
      { "Expansion":5,"Aliveness":5,"Resonance":5,"Momentum":4,"Meaning":5,"Sustainability":4,"Self-respect":5 },
      "2026-06-09T09:14:00"),
    mk("Bright Path Labs", "Senior PM, Growth", "discovery",
      { "Builder Energy":2,"Expansion":2,"Momentum":1,"Resonance":2,"Meaning":1,"Sustainability":2,"Career Signal":1 },
      "2026-06-08T15:32:00"),
    mk("Atlas Garden Studio", "PM, Core Product", "hm",
      { choice: "green" },
      "2026-06-08T11:05:00"),
    mk("Harbor Signal", "PM, Platform", "recruiter",
      { "Expansion":4,"Aliveness":4,"Resonance":4,"Momentum":3,"Sustainability":4 },
      "2026-06-07T11:10:00"),
    mk("Pebble Cloud", "PM, Internal Tools", "discovery",
      { "Builder Energy":1,"Expansion":1,"Momentum":1,"Resonance":1,"Meaning":1,"Sustainability":1,"Career Signal":0 },
      "2026-06-06T09:48:00"),
    mk("Maple Systems", "PM, Operations", "recruiter",
      { "Expansion":3,"Aliveness":2,"Resonance":3,"Momentum":3,"Sustainability":3 },
      "2026-06-05T14:02:00"),
    mk("Paper Lantern Labs", "Group PM", "discovery",
      { "Builder Energy":1,"Expansion":0,"Momentum":1,"Resonance":1,"Meaning":0,"Sustainability":1,"Career Signal":0 },
      "2026-06-04T16:20:00"),
  ];
}
function seedIfEmpty() {
  if (localStorage.getItem(STORE_KEY)) return loadEvals();
  const seed = demoSeed();
  saveEvals(seed);
  return seed;
}

function defaultValues(stage) {
  if (stage.criteria) {
    const m = {};
    stage.criteria.forEach((c) => { m[c.name] = stage.range[0]; });
    return m;
  }
  return { choice: null };
}

function metricChip(rec) {
  const stage = STAGES.find((s) => s.id === rec.stageId);
  if (!stage) return "";
  if (stage.criteria) {
    const c = computeStage(stage, rec.raw);
    return stage.id === "recruiter" ? c.avg.toFixed(1) + " / 5" : c.sum + " / " + stage.gate.max;
  }
  return null;
}

Object.assign(window, {
  STAGES, SCORABLE,
  jdTier, recruiterVerdict, offerVerdict, computeStage, evalVerdict,
  TIERS, tierFromColor, nowStamp, formatStamp, defaultValues, metricChip,
  loadEvals, saveEvals, demoSeed, seedIfEmpty,
});
</script>

  ),
  clock: () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></svg>
  ),
  eye: () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" /><circle cx="12" cy="12" r="3" /></svg>
  ),
};

function valClass(v, range) {
  const span = range[1] - range[0];
  const t = (v - range[0]) / span;
  if (t <= 0.34) return "lo";
  if (t < 0.67) return "mid";
  return "hi";
}
function colorToScale(color) { return color === "green" ? "hi" : color === "amber" ? "mid" : "lo"; }

function SliderRow({ crit, value, range, onChange }) {
  const span = range[1] - range[0];
  const pct = ((value - range[0]) / span) * 100;
  const fill = `linear-gradient(to right, var(--teal) ${pct}%, var(--line) ${pct}%)`;
  return (
    <div className="crit">
      <div className="crit-top">
        <span className="crit-name">{crit.name}</span>
        <span className="crit-q">{crit.q}</span>
        <span className={"crit-val " + valClass(value, range)}>{value}</span>
      </div>
      <input
        className="slider" type="range" min={range[0]} max={range[1]} step="1"
        value={value} style={{ background: fill }}
        onChange={(e) => onChange(parseInt(e.target.value, 10))}
      />
    </div>
  );
}

function GateDiamonds({ gate, activeColor }) {
  return (
    <div className="gate">
      {gate.rules.map((r) => (
        <div className={"gate-item" + (r.color === activeColor ? " active" : "")} key={r.title}>
          <div className={"gate-dia " + r.color}><span className="d"></span></div>
          <div className={"gate-text " + r.color}>
            <b>{r.cond} = {r.title}</b>
            <span>{r.sub}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function RejectBox({ items, checks, onToggle }) {
  return (
    <div className="tint-box red">
      <div className="tb-head"><Ic.xcircle /> Auto-reject triggers</div>
      {items.map((it) => (
        <label className="check crossed" key={it}>
          <input type="checkbox" checked={!!checks[it]} onChange={() => onToggle(it)} />
          <span className="box"><Ic.check /></span>
          <span className="lab">{it}</span>
        </label>
      ))}
    </div>
  );
}

function DecisionBox({ verdict, metricText }) {
  return (
    <div className={"decision " + verdict.color}>
      <div className="dl">Your decision</div>
      <div className="dv">{verdict.label}</div>
      <div className="ds">{metricText}</div>
    </div>
  );
}

function TotalFooter({ label, valueText, denText, scale }) {
  return (
    <div className="sc-total">
      <span className="tl">{label}</span>
      <span className={"tn " + scale}>{valueText}<span className="den">{denText}</span></span>
    </div>
  );
}

function EmotionalGuard({ emotional }) {
  return (
    <div className="tint-box amber">
      <div className="tb-head"><Ic.heart /> Emotional protection</div>
      <div style={{ fontSize: 14, color: "var(--ink-2)", marginBottom: 9 }}>{emotional.rule}</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {emotional.triggers.map((t) => (
          <span key={t} className="trigger-chip">{t}</span>
        ))}
      </div>
    </div>
  );
}

function Questions({ label, items }) {
  return (
    <div>
      <div className="col-label">{label}</div>
      <ul className="qlist">
        {items.map((q, i) => (
          <li key={q}><span className="qb">{i + 1}</span><span>{q}</span></li>
        ))}
      </ul>
    </div>
  );
}

function DecisionPicker({ stage, choice, setChoice }) {
  return (
    <div>
      <div className="col-label" style={{ marginBottom: 12 }}>{stage.decisions.prompt}</div>
      <div className="decide-opts">
        {stage.decisions.options.map((o) => (
          <button
            type="button" key={o.color}
            className={"decide-opt " + o.color + (choice === o.color ? " sel" : "")}
            onClick={() => setChoice(o.color)}
          >
            <span className={"decide-dia " + o.color}><span className="d"></span></span>
            <span className="decide-lab">{o.label}</span>
            <span className="decide-tick"><Ic.check /></span>
          </button>
        ))}
      </div>
    </div>
  );
}

function Checkpoint({ text }) {
  return (
    <div className="checkpoint">
      <div className="cl"><Ic.eye /> Reflect</div>
      <div className="cq">"{text}"</div>
    </div>
  );
}

function Scorecard({ stage, values, setVal, setChoice, autoReject, toggleReject }) {
  const isScorable = !!stage.criteria;
  const comp = isScorable ? computeStage(stage, values) : null;

  return (
    <div className="stage-card" data-screen-label={"Stage " + stage.n}>
      <div className="sc-head">
        <div className={"sc-badge" + (stage.reflective ? " soft" : "")}>{stage.n}</div>
        <div className="sc-htext">
          <h3>{stage.name}</h3>
          <div className="sub">{stage.sub}</div>
        </div>
      </div>

      {stage.input && (
        <div className="input-chip"><Ic.file /> Input: {stage.input}</div>
      )}

      {stage.id === "discovery" && (
        <>
          <div className="sc-body">
            <div>
              <div className="col-label">{stage.scoreLabel}</div>
              {stage.criteria.map((c) => (
                <SliderRow key={c.name} crit={c} range={stage.range}
                  value={values[c.name]} onChange={(v) => setVal(c.name, v)} />
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
              <div className="col-label" style={{ marginBottom: 0 }}>Decision gate</div>
              <GateDiamonds gate={stage.gate} activeColor={comp.verdict.color} />
              <RejectBox items={stage.autoReject} checks={autoReject} onToggle={toggleReject} />
              <DecisionBox verdict={comp.verdict} metricText={"Score: " + comp.sum + "/" + stage.gate.max} />
            </div>
          </div>
          <TotalFooter label="Total Score" valueText={comp.sum} denText={"/" + stage.gate.max} scale={colorToScale(comp.verdict.color)} />
        </>
      )}

      {stage.id === "recruiter" && (
        <>
          <div className="sc-body">
            <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
              <Questions label="Intro questions" items={stage.questions} />
              <div>
                <div className="col-label">{stage.scoreLabel}</div>
                {stage.criteria.map((c) => (
                  <SliderRow key={c.name} crit={c} range={stage.range}
                    value={values[c.name]} onChange={(v) => setVal(c.name, v)} />
                ))}
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
              <div className="col-label" style={{ marginBottom: 0 }}>Decision gate</div>
              <GateDiamonds gate={stage.gate} activeColor={comp.verdict.color} />
              <EmotionalGuard emotional={stage.emotional} />
              <DecisionBox verdict={comp.verdict} metricText={comp.avg.toFixed(1) + " avg"} />
            </div>
          </div>
          <TotalFooter label="Average" valueText={comp.avg.toFixed(1)} denText={" / 5"} scale={colorToScale(comp.verdict.color)} />
        </>
      )}

      {stage.id === "hm" && (
        <div className="sc-body">
          <Questions label="Team questions" items={stage.questions} />
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <DecisionPicker stage={stage} choice={values.choice} setChoice={setChoice} />
            <Checkpoint text={stage.checkpoint} />
          </div>
        </div>
      )}

      {stage.id === "emotion" && (
        <div className="sc-body">
          <div>
            <div className="col-label">Cooling-off rules</div>
            {stage.waitRules.map((w, i) => (
              <div className="wait-rule" key={i}>
                <span style={{ color: "var(--teal)" }}><Ic.clock /></span>
                <span className="badge">{w.badge}</span>
                <span className="wt">{w.text}</span>
              </div>
            ))}
            <div style={{ marginTop: 18 }}>
              <Checkpoint text={stage.checkpoint} />
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <DecisionPicker stage={stage} choice={values.choice} setChoice={setChoice} />
          </div>
        </div>
      )}

      {stage.id === "offer" && (
        <>
          <div className="sc-body">
            <div>
              <div className="col-label">{stage.scoreLabel}</div>
              {stage.criteria.map((c) => (
                <SliderRow key={c.name} crit={c} range={stage.range}
                  value={values[c.name]} onChange={(v) => setVal(c.name, v)} />
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
              <div className="col-label" style={{ marginBottom: 0 }}>Decision gate</div>
              <GateDiamonds gate={stage.gate} activeColor={comp.verdict.color} />
              <DecisionBox verdict={comp.verdict} metricText={"Score: " + comp.sum + "/" + stage.gate.max} />
            </div>
          </div>
          <TotalFooter label="Total Score" valueText={comp.sum} denText={"/" + stage.gate.max} scale={colorToScale(comp.verdict.color)} />
        </>
      )}
    </div>
  );
}

Object.assign(window, { Scorecard, Ic });
</script>

<script type="text/babel">
const TIER_ORDER = ["A", "B", "R"];
const TIER_META = {
  A: { color: "green", label: "Tier A", note: "Prioritize — full energy" },
  B: { color: "amber", label: "Tier B", note: "Strategic — proceed carefully" },
  R: { color: "red",   label: "Rejected", note: "Let it go with respect" },
  X: { color: "gray",  label: "Archived", note: "Inactive applications" },
};

function groupAndRank(evals) {
  const g = { A: [], B: [], R: [] };
  evals.filter((e) => !e.archived).forEach((e) => { g[tierFromColor(e.color).key].push(e); });
  Object.values(g).forEach((a) =>
    a.sort((x, y) => (y.norm - x.norm) || (new Date(y.ts) - new Date(x.ts)))
  );
  return g;
}

function archiveIcon() {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="4" width="18" height="4" rx="1" />
      <path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8" />
      <path d="M10 12h4" />
    </svg>
  );
}

function notePreview(note) {
  const words = (note || "").trim().split(/\s+/).filter(Boolean);
  if (!words.length) return "";
  return words.slice(0, 5).join(" ") + (words.length > 5 ? "..." : "");
}

function EvalRow({ rank, e, onEdit, onDelete, onArchive, onNote }) {
  const stage = STAGES.find((s) => s.id === e.stageId);
  const stamp = formatStamp(e.ts);
  const metric = metricChip(e);
  const archived = !!e.archived;
  const rowColor = archived ? "archived" : e.color;
  const preview = notePreview(e.note);
  return (
    <div className={"board-row " + rowColor} onClick={() => onEdit(e)}>
      <div className="br-rank"><span>{rank}</span></div>

      <div className="br-main">
        <div className="br-co">{e.company}</div>
        <div className="br-ti">{e.title}</div>
        {archived && e.archiveReason && <div className="br-ti">Reason: {e.archiveReason}</div>}
      </div>

      <div className="br-stage">
        <span className="stage-n">{stage ? stage.n : "?"}</span>
        <span className="stage-name">{e.stageName}</span>
      </div>

      <div className="br-score">
        {archived
          ? <span className="metric gray">inactive</span>
          : metric
          ? <span className={"metric " + e.color}>{metric}</span>
          : <span className="metric ghosted">decision</span>}
      </div>

      <div className="br-verdict">
        <span className={"vpill " + (archived ? "gray" : e.color)}>
          <span className="vd"></span>{archived ? "Archived" : e.label}
        </span>
      </div>

      <div className="br-note">
        <button
          className={"note-btn" + (preview ? " has-note" : "")}
          onClick={(ev) => { ev.stopPropagation(); onNote(e); }}
          aria-label={preview ? "Edit note" : "Add note"}
          type="button"
        >
          {!preview && <span className="plus">+</span>}
          <span className="note-preview">{preview || "Add note"}</span>
        </button>
        {e.note && <div className="note-tooltip">{e.note}</div>}
      </div>

      <div className="br-time">
        <span className="t-date">{stamp.date}</span>
        <span className="t-time">{stamp.time}</span>
      </div>

      <div className="br-actions">
        <button className="row-btn" title="Edit" onClick={(ev) => { ev.stopPropagation(); onEdit(e); }} aria-label="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z" /></svg>
        </button>
        {!archived && (
          <button className="row-btn archive" title="Archive" onClick={(ev) => { ev.stopPropagation(); onArchive(e); }} aria-label="Archive">
            {archiveIcon()}
          </button>
        )}
        <button className="row-btn danger" title="Delete" onClick={(ev) => { ev.stopPropagation(); onDelete(e.id); }} aria-label="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" /><path d="M10 11v6M14 11v6" /></svg>
        </button>
      </div>
    </div>
  );
}

function Leaderboard({ evals, onNew, onEdit, onDelete, onArchive, onNote }) {
  const g = groupAndRank(evals);
  const archived = evals.filter((e) => e.archived)
    .sort((x, y) => new Date(y.archivedAt || y.ts) - new Date(x.archivedAt || x.ts));
  const counts = { A: g.A.length, B: g.B.length, R: g.R.length, X: archived.length };

  return (
    <main className="board">
      <div className="board-inner">

        <div className="board-head">
          <div>
            <h2>My Evaluations</h2>
            <p>Ranked by tier — the roles worth your energy rise to the top.</p>
          </div>
          <div className="board-head-right">
            <div className="tier-counts">
              <span className="tc green"><b>{counts.A}</b> Tier A</span>
              <span className="tc amber"><b>{counts.B}</b> Tier B</span>
              <span className="tc red"><b>{counts.R}</b> Rejected</span>
              <span className="tc"><b>{counts.X}</b> Archived</span>
            </div>
            <button className="btn" onClick={onNew}>
              <span className="ic">+</span> New evaluation
            </button>
          </div>
        </div>

        {evals.length === 0 && (
          <div className="board-empty">
            <div className="be-mark">★</div>
            <h3>No evaluations yet</h3>
            <p>Start one to score a role against the framework. Saved roles appear here, ranked by tier.</p>
            <button className="btn" onClick={onNew}><span className="ic">+</span> New evaluation</button>
          </div>
        )}

        {evals.length > 0 && (
          <div className="board-cols" aria-hidden="true">
            <span></span>
            <span>Jobs</span>
            <span>Stage</span>
            <span>Score</span>
            <span>Decision</span>
            <span>Notes</span>
            <span>Updated</span>
            <span></span>
          </div>
        )}

        {TIER_ORDER.map((k) => (
          g[k].length > 0 && (
            <section className="tier-section" key={k}>
              <div className={"tier-banner " + TIER_META[k].color}>
                <span className="tb-dot"></span>
                <span className="tb-label">{TIER_META[k].label}</span>
                <span className="tb-note">{TIER_META[k].note}</span>
                <span className="tb-count">{g[k].length}</span>
              </div>
              <div className="board-list">
                {g[k].map((e, i) => (
                  <EvalRow key={e.id} rank={i + 1} e={e} onEdit={onEdit} onDelete={onDelete} onArchive={onArchive} onNote={onNote} />
                ))}
              </div>
            </section>
          )
        ))}

        {archived.length > 0 && (
          <section className="tier-section">
            <div className={"tier-banner " + TIER_META.X.color}>
              <span className="tb-dot"></span>
              <span className="tb-label">{TIER_META.X.label}</span>
              <span className="tb-note">{TIER_META.X.note}</span>
              <span className="tb-count">{archived.length}</span>
            </div>
            <div className="board-list">
              {archived.map((e, i) => (
                <EvalRow key={e.id} rank={i + 1} e={e} onEdit={onEdit} onDelete={onDelete} onArchive={onArchive} onNote={onNote} />
              ))}
            </div>
          </section>
        )}

      </div>
    </main>
  );
}

Object.assign(window, { Leaderboard });
</script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function newDraft(stageId) {
  const sid = stageId || STAGES[0].id;
  const stage = STAGES.find((s) => s.id === sid);
  return { id: null, company: "", title: "", stageId: sid, values: defaultValues(stage), autoReject: {}, note: "" };
}
function draftFromEval(e) {
  const stage = STAGES.find((s) => s.id === e.stageId) || STAGES[0];
  const base = defaultValues(stage);
  return {
    id: e.id, company: e.company || "", title: e.title || "", stageId: stage.id,
    values: { ...base, ...(e.raw || {}) },
    autoReject: { ...(e.autoReject || {}) },
    note: e.note || "",
    archived: !!e.archived,
    archiveReason: e.archiveReason || "",
    archivedAt: e.archivedAt,
    ts: e.ts
  };
}

function EvaluationModal({ draft0, onClose, onSave }) {
  const [draft, setDraft] = useState(draft0);
  const stage = STAGES.find((s) => s.id === draft.stageId);
  const editing = !!draft.id;

  const setVal = useCallback((name, v) =>
    setDraft((d) => ({ ...d, values: { ...d.values, [name]: v } })), []);
  const setChoice = useCallback((color) =>
    setDraft((d) => ({ ...d, values: { ...d.values, choice: color } })), []);
  const toggleReject = useCallback((label) =>
    setDraft((d) => ({ ...d, autoReject: { ...d.autoReject, [label]: !d.autoReject[label] } })), []);

  function pickStage(sid) {
    setDraft((d) => {
      if (d.stageId === sid) return d;
      const st = STAGES.find((s) => s.id === sid);
      return { ...d, stageId: sid, values: defaultValues(st) };
    });
  }

  const verdict = evalVerdict(stage, draft.values);
  const reflective = !stage.criteria;
  const needsChoice = reflective && !draft.values.choice;
  const canSave = !!draft.company.trim() && !needsChoice;

  function submit() {
    if (!canSave) return;
    onSave(draft, stage, verdict);
  }

  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal modal-lg" onClick={(e) => e.stopPropagation()}>

        <div className="modal-h">
          <div>
            <h2>{editing ? "Edit evaluation" : "New evaluation"}</h2>
            <p>Capture the role, pick where you are in the process, and score it.</p>
          </div>
          <button className="modal-x" onClick={onClose} aria-label="Close">✕</button>
        </div>

        <div className="modal-scroll">
          <div className="meta-grid">
            <div className="mfield">
              <label>Company</label>
              <input autoFocus value={draft.company} placeholder="e.g. Northwind"
                onChange={(e) => setDraft((d) => ({ ...d, company: e.target.value }))} />
            </div>
            <div className="mfield">
              <label>Job title</label>
              <input value={draft.title} placeholder="e.g. Senior PM, Growth"
                onChange={(e) => setDraft((d) => ({ ...d, title: e.target.value }))} />
            </div>
          </div>

          <div className="mfield">
            <label>Hiring stage</label>
            <div className="stage-tabs">
              {STAGES.map((s) =>
                <button key={s.id} type="button"
                  className={"stage-tab" + (s.id === draft.stageId ? " active" : "")}
                  onClick={() => pickStage(s.id)}>
                  <span className="st-n">{s.n}</span>
                  <span className="st-name">{s.name}</span>
                </button>
              )}
            </div>
          </div>

          <div className="score-area">
            <Scorecard
              stage={stage} values={draft.values}
              setVal={setVal} setChoice={setChoice}
              autoReject={draft.autoReject} toggleReject={toggleReject} />
          </div>

          <div className="mfield">
            <label>Note</label>
            <textarea value={draft.note} placeholder="Add updates, reminders, interview feedback, follow-ups, or anything you want to remember about this role."
              onChange={(e) => setDraft((d) => ({ ...d, note: e.target.value }))} />
          </div>
        </div>

        <div className="modal-f">
          <div className={"live-verdict " + verdict.color}>
            <span className="lv-label">Current verdict</span>
            <span className="lv-val"><span className="vd"></span>{verdict.label}</span>
            <span className="lv-tier">→ {tierFromColor(verdict.color).label}</span>
          </div>
          <div className="modal-f-actions">
            <button className="btn ghost" onClick={onClose}>Cancel</button>
            <button className="btn" disabled={!canSave} onClick={submit}>
              {editing ? "Save changes" : "Save evaluation"}
            </button>
          </div>
        </div>

      </div>
    </div>
  );
}

function ArchiveModal({ item, onClose, onConfirm }) {
  const [reason, setReason] = useState("");
  const canArchive = !!reason.trim();

  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-h">
          <div>
            <h2>Archive application</h2>
            <p>This will move the role into Archived and mark it inactive.</p>
          </div>
          <button className="modal-x" onClick={onClose} aria-label="Close">✕</button>
        </div>

        <div className="archive-preview">
          <b>{item.company}</b>
          <span>{item.title}</span>
        </div>

        <div className="modal-scroll">
          <div className="mfield">
            <label>Reasons</label>
            <textarea autoFocus value={reason} placeholder="Why are you archiving this role?"
              onChange={(e) => setReason(e.target.value)} />
          </div>
        </div>

        <div className="modal-f">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn" disabled={!canArchive} onClick={() => onConfirm(item.id, reason.trim())}>
            Archive
          </button>
        </div>
      </div>
    </div>
  );
}

function NotesModal({ item, onClose, onSave }) {
  const [note, setNote] = useState(item.note || "");
  const stage = STAGES.find((s) => s.id === item.stageId);

  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal note-modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-h">
          <div>
            <h2>Notes</h2>
          </div>
          <button className="modal-x" onClick={onClose} aria-label="Close">×</button>
        </div>

        <div className="note-job">
          <div className="note-job-logo">CD</div>
          <div>
            <div className="note-job-title">{item.title}</div>
            <div className="note-job-sub">{item.company} · {stage ? stage.name : "Application"}</div>
          </div>
        </div>

        <div className="modal-scroll">
          <p className="note-copy">Add a quick note to remember what stood out about this job.</p>
          <div className="mfield">
            <textarea autoFocus value={note} placeholder="Examples: I know the hiring manager"
              onChange={(e) => setNote(e.target.value)} />
          </div>
        </div>

        <div className="modal-f">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={() => onSave(item.id, note.trim())}>Save</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [evals, setEvals] = useState(() => seedIfEmpty());
  const [modal, setModal] = useState(null);
  const [archiveTarget, setArchiveTarget] = useState(null);
  const [noteTarget, setNoteTarget] = useState(null);
  const importRef = React.useRef(null);

  useEffect(() => { saveEvals(evals); }, [evals]);

  const openNew = useCallback(() => setModal(newDraft()), []);
  const openEdit = useCallback((e) => setModal(draftFromEval(e)), []);
  const closeModal = useCallback(() => setModal(null), []);
  const openArchive = useCallback((e) => setArchiveTarget(e), []);
  const closeArchive = useCallback(() => setArchiveTarget(null), []);
  const openNote = useCallback((e) => setNoteTarget(e), []);
  const closeNote = useCallback(() => setNoteTarget(null), []);

  const handleDelete = useCallback((id) =>
    setEvals((prev) => prev.filter((e) => e.id !== id)), []);

  const handleArchive = useCallback((id, reason) => {
    setEvals((prev) => prev.map((e) =>
      e.id === id ? { ...e, archived: true, archiveReason: reason, archivedAt: nowStamp() } : e
    ));
    setArchiveTarget(null);
  }, []);

  const handleNoteSave = useCallback((id, note) => {
    setEvals((prev) => prev.map((e) =>
      e.id === id ? { ...e, note } : e
    ));
    setNoteTarget(null);
  }, []);

  function exportData() {
    const payload = {
      app: "Career Decision System",
      exportedAt: nowStamp(),
      evaluations: evals,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "career-decision-system-backup.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        const next = Array.isArray(parsed) ? parsed : parsed.evaluations;
        if (!Array.isArray(next)) throw new Error("Missing evaluations");
        setEvals(next);
      } catch (e) {
        alert("This file does not look like a Career Decision System backup.");
      } finally {
        if (importRef.current) importRef.current.value = "";
      }
    };
    reader.readAsText(file);
  }

  function resetDemo() {
    if (!window.confirm("Replace the current browser data with fictional demo data? Export first if you want to keep your current tracker.")) return;
    setEvals(demoSeed());
  }

  function handleSave(draft, stage, verdict) {
    const record = {
      id: draft.id || "e" + Date.now(),
      company: draft.company.trim(),
      title: draft.title.trim() || "—",
      stageId: stage.id,
      stageName: stage.name,
      raw: draft.values,
      autoReject: draft.autoReject,
      note: draft.note || "",
      archived: !!draft.archived,
      archiveReason: draft.archiveReason || "",
      archivedAt: draft.archivedAt,
      ts: draft.ts || nowStamp(),
      color: verdict.color,
      label: verdict.label,
      metricText: verdict.metricText,
      norm: verdict.norm
    };
    setEvals((prev) => {
      const idx = prev.findIndex((e) => e.id === record.id);
      if (idx >= 0) { const c = prev.slice(); c[idx] = record; return c; }
      return [record, ...prev];
    });
    setModal(null);
  }

  return (
    <div className="app">
      <header className="appbar">
        <div className="brand">
          <div className="logo">CD</div>
          <div>
            <h1>Career Decision System</h1>
            <div className="tag">A structured, low-emotion job search <span className="demo-pill">Demo</span></div>
          </div>
        </div>
        <div className="spacer"></div>
        <div className="app-actions">
          <button className="btn ghost slim" onClick={exportData}>Export data</button>
          <button className="btn ghost slim" onClick={() => importRef.current && importRef.current.click()}>Import data</button>
          <button className="btn ghost slim" onClick={resetDemo}>Reset demo</button>
          <input ref={importRef} type="file" accept="application/json,.json" onChange={(e) => importData(e.target.files[0])} />
        </div>
      </header>

      <Leaderboard
        evals={evals}
        onNew={openNew}
        onEdit={openEdit}
        onDelete={handleDelete}
        onArchive={openArchive}
        onNote={openNote}
      />

      <footer className="northstar">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.9-10-9.5C.4 8 2 4.5 5.5 4.5c2 0 3.4 1.2 4.5 2.6 1.1-1.4 2.5-2.6 4.5-2.6C18 4.5 19.6 8 18 11.5 15.5 16.1 12 21 12 21z" /></svg>
        Your career is too important for emotional reactions and too personal for pure logic. Use both. Trust the process.
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.9-10-9.5C.4 8 2 4.5 5.5 4.5c2 0 3.4 1.2 4.5 2.6 1.1-1.4 2.5-2.6 4.5-2.6C18 4.5 19.6 8 18 11.5 15.5 16.1 12 21 12 21z" /></svg>
      </footer>

      {modal &&
        <EvaluationModal draft0={modal} onClose={closeModal} onSave={handleSave} />
      }
      {archiveTarget &&
        <ArchiveModal item={archiveTarget} onClose={closeArchive} onConfirm={handleArchive} />
      }
      {noteTarget &&
        <NotesModal item={noteTarget} onClose={closeNote} onSave={handleNoteSave} />
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
